name: CD — Deploy to Cloud Run

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    env:
      PROJECT_ID: apac-2026-taskforge
      REGION: asia-south1
      SERVICE: taskforge
      IMAGE: asia-south1-docker.pkg.dev/apac-2026-taskforge/taskforge/taskforge

    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Build and push image
        run: |
          BUILD_ID=$(gcloud builds submit \
            --tag ${{ env.IMAGE }}:${{ github.sha }} \
            --project ${{ env.PROJECT_ID }} \
            --async \
            --format='value(id)')
          echo "Build started: $BUILD_ID"

          # Poll until complete
          while true; do
            STATUS=$(gcloud builds describe "$BUILD_ID" \
              --project ${{ env.PROJECT_ID }} \
              --format='value(status)')
            echo "Build status: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then break; fi
            if [ "$STATUS" = "FAILURE" ] || [ "$STATUS" = "CANCELLED" ] || [ "$STATUS" = "TIMEOUT" ]; then
              echo "Build failed with status: $STATUS"
              exit 1
            fi
            sleep 10
          done

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --add-cloudsql-instances=${{ env.PROJECT_ID }}:${{ env.REGION }}:taskforge-db \
            --set-env-vars="DATABASE_URL=postgresql+asyncpg://postgres:taskforge2026@/taskforge?host=/cloudsql/${{ env.PROJECT_ID }}:${{ env.REGION }}:taskforge-db" \
            --set-env-vars="GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" \
            --set-env-vars="GEMINI_MODEL=gemini-2.5-flash" \
            --set-env-vars="LOG_LEVEL=INFO" \
            --memory=1Gi \
            --cpu=1 \
            --timeout=300 \
            --cpu-boost \
            --min-instances=1 \
            --max-instances=3 \
            --project ${{ env.PROJECT_ID }}

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --format='value(status.url)')
          echo "Deployed to: $URL"
          # Retry up to 90s — startup needs DB init + seed before health reports ready
          for i in $(seq 1 6); do
            STATUS=$(curl -sf "$URL/health" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['status'])" 2>/dev/null || echo "unreachable")
            echo "Attempt $i: status=$STATUS"
            if [ "$STATUS" = "healthy" ] || [ "$STATUS" = "degraded" ]; then
              echo "Health check passed: $STATUS"
              exit 0
            fi
            sleep 15
          done
          echo "Health check failed after 90s"
          curl -sf "$URL/health" || true
          exit 1
